build:
  gpu: true
  cuda: "12.8"
  python_version: "3.12"
  python_packages:
    - torch==2.8.0
    - diffusers>=0.35
    - transformers>=4.55
    - accelerate>=1.0
    - torchao>=0.11
    - vllm>=0.10
    - fastapi>=0.115
    - httpx>=0.27
    - safetensors
    - huggingface_hub
    - pillow
    - numpy
    - av
    - pydantic
  run:
    - pip install --no-deps .
predict: "predict.py:Predictor"
